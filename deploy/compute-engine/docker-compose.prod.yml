version: "3.8"

services:
  frontend:
    image: nginx:alpine
    container_name: hotel2_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./cloud-storage:/usr/share/nginx/html/cloud-storage:ro
    restart: always

  backend:
    build: ./backend
    container_name: hotel2_backend
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./cloud-storage:/var/www/html/cloud-storage
    restart: always
    environment:
      DB_HOST: ${DB_HOST:-localhost}
      DB_USER: ${DB_USER:-user}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-hotel}

  # Nếu dùng Cloud SQL thì comment db service này lại
  db:
    image: mysql:8.0
    container_name: hotel2_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hotel}
      MYSQL_USER: ${MYSQL_USER:-user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: hotel2_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-123456}

volumes:
  mysql_data:
