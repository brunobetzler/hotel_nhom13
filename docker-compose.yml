version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: hotel2_frontend
    ports:
      - "45000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html # <--- ADD THIS MOUNT
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./cloud-storage:/usr/share/nginx/html/cloud-storage:ro # <--- ADD THIS
    depends_on:
      - backend
    restart: always

  backend:
    build: ./backend
    container_name: hotel2_backend
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./cloud-storage:/var/www/html/cloud-storage:ro          # ← Mount cho backend (nếu cần)
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: 123456
      DB_NAME: hotel
    restart: always

  db:
    image: mysql:8.0
    container_name: hotel2_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hotel
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: hotel2_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: user
      PMA_PASSWORD: 123456
    depends_on:
      - db

volumes:
  db_data:
  
